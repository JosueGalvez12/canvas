<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToonDraw - Pro</title>
    <!-- Fuente Estilo Caricatura -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <!-- Iconos FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <!-- Contenedor general de capas de Canvas -->
        <div id="canvas-container">
            <!-- Las capas se insertarán aquí dinámicamente -->
        </div>

        <!-- Panel de Herramientas Principal -->
        <div class="panel toolbar">
            <h1 class="header-title">🎨 ToonDraw</h1>
            
            <div class="tool-group">
                <label for="colorPicker">Color</label>
                <input type="color" id="colorPicker" value="#ef233c">
            </div>

            <div class="tool-group">
                <label for="brushSize">Grosor</label>
                <input type="range" id="brushSize" min="1" max="50" value="8">
            </div>

            <div class="tool-group">
                <label for="opacitySlider">Opacidad</label>
                <input type="range" id="opacitySlider" min="0" max="1" step="0.05" value="1">
            </div>

            <div class="tool-group">
                <label for="brushType">Tipo de Trazo</label>
                <select id="brushType" class="custom-select">
                    <option value="solid">🔴 Sólido (Básico)</option>
                    <option value="square">⬛ Cuadrado</option>
                    <option value="dashed">➖ Punteado</option>
                    <option value="shadow">☁️ Aerógrafo</option>
                </select>
            </div>

            <div class="tool-checkbox">
                <input type="checkbox" id="fillShape">
                <label for="fillShape">Rellenar Figura</label>
            </div>

            <div class="btn-grid">
                <button id="btn-pen" class="tool-btn active" title="Lápiz / Pincel"><i class="fas fa-pencil-alt"></i></button>
                <button id="btn-eraser" class="tool-btn" title="Borrador"><i class="fas fa-eraser"></i></button>
                
                <button id="btn-ruler" class="tool-btn" title="Línea Recta"><i class="fas fa-ruler-combined"></i></button>
                <button id="btn-curve" class="tool-btn" title="Línea Curva"><i class="fas fa-bezier-curve"></i></button>

                <button id="btn-rect" class="tool-btn" title="Rectángulo"><i class="far fa-square"></i></button>
                <button id="btn-circle" class="tool-btn" title="Círculo"><i class="far fa-circle"></i></button>

                <button id="btn-mirror" title="Espejo (Simetría Horizontal)"><i class="fas fa-arrows-alt-h"></i></button>
                <!-- Empty div for alignment on grid -->
                <!-- Controles Universales -->
                <button id="btn-undo" class="btn-full" title="Deshacer (Ctrl+Z)" style="background: #e8e8e4"><i class="fas fa-undo"></i> Deshacer Trazo</button>
                <button id="btn-clear" class="btn-full" title="Limpiar Capa Actual"><i class="fas fa-trash-alt"></i> Borrar Capa</button>
                <button id="btn-download" class="btn-full" title="Guardar PNG"><i class="fas fa-download"></i> Guardar Imagen</button>
            </div>
        </div>

        <!-- Panel de Capas -->
        <div class="panel layers-panel">
            <h2 class="header-title">Capas</h2>
            
            <button id="btn-add-layer" class="btn-full add-layer-btn"><i class="fas fa-plus"></i> Nueva Capa</button>

            <div class="layer-list" id="layer-list">
                <!-- Se poblará con JS -->
            </div>
        </div>

    </div>

    <!-- Guía del eje de simetría (Espejo) -->
    <div id="mirror-axis" title="Arrastra para mover el eje">
        <div class="mirror-handle"><i class="fas fa-arrows-alt-h"></i></div>
    </div>

    <!-- Script Lógico -->
    <script src="app.js"></script>
</body>
</html>
